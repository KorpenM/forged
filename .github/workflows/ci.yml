name: CI – Build & Test

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kod
        uses: actions/checkout@v6

      - name: Sätt upp .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Återställ beroenden
        run: dotnet restore src/Forged/Forged.csproj

      - name: Bygg applikationen
        run: dotnet build src/Forged/Forged.csproj --no-restore --configuration Release

      - name: Bygg Docker-image
        run: docker build -t forged:latest src/Forged/

      - name: Skanna Docker-image med Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy image --severity HIGH,CRITICAL --format table forged:latest